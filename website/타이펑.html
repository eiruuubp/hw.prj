<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타이펑</title>
    <style>
        /* 웹폰트 */
        @font-face {
            font-family: 'GyeonggiMillenniumTitle';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-3@1.0/Title_Light.woff') format('woff');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'GyeonggiMillenniumTitle';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-3@1.0/Title_Medium.woff') format('woff');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'GyeonggiMillenniumTitle';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-3@1.0/Title_Bold.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'GyeonggiMillenniumTitle';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-3@1.0/TitleV.woff') format('woff');
            font-weight: 800;
            font-display: swap;
        }

        /* 애니메이션 */
        @keyframes website {
            0% { transform: translateY(30px); opacity: 0;}
            100% { transform: translateY(0); opacity: 1;}
        }

        /* html */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ECF5FC;
        }

        .app {
            width: 1230px;
            margin: 20px auto;
            background-color: #fff;
            display: grid;

            grid-template-columns: 220px 20px 960px;
            grid-template-rows: 50px 140px auto 80px;
            gap: 16px;

            grid-template-areas:
                "header header header"
                "nav    nav    nav"
                "sidebar main  main"
                "sidebar footer footer";
            justify-content: center;
            align-items: stretch;
        }

        header,
        nav,
        aside,
        main,
        footer {
            border: 2px solid #FDDDE1;
            padding: 16px;
            border-radius: 15px;
        }

        header {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            padding: 0 20px;
            font-size: 14px;
            color: #8bbefc;
        }

        nav {
            grid-area: nav;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20pxz;
            font-family: 'GyeonggiMillenniumTitle';
        }

        aside {
            grid-area: sidebar;
            align-self: start;
        }

        main {
            grid-area: main;
            display: flex;
            flex-direction: column;
        }

        footer {
            grid-area: footer;
            border: 2px solid #FDDDE1;
            border-radius: 15px;
            justify-content: center;
            align-items: center;
        }

        .back-to-main {
            text-decoration: none;
            color: #8bbefc;
            font-weight: bold;
            font-size: 18px;
            transition: color 0.2s ease;
        }

        .back-to-main:hover {
            color: #004E82;
        }

        /* 사이드 프로필 */

        .profile-box {
            width: 180px;
            border: 2px solid #FDDDE1;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 15px;
        }

        .side-image {
            padding: 0;
            width: 180px;
            height: 180px;
            border: none;
            margin-bottom: 12px;
        }

        .side-image img {
            width: 85%;
            height: 85%;
        }

        .category {
            width: 180px;
            border: 2px solid #FDDDE1;
            padding: 10px;
            margin-top: 12px;
            justify-self: start;
            align-items: start;
            font-size: 14px;
            color: #8bbefc;
            font-weight: bold;
            border-radius: 15px;
        }

        .category div:hover {
            color: #004E82;
        }

        .card-container {
            display: grid;
            grid-template-columns: 260px 260px 260px;
            justify-content: center;
            gap: 50px;
            margin-top: 30px;
        }

        .card {
            display: flex;
            flex-direction: column;
            text-decoration: none;

            border: 10px solid #ECF5FC;
            border-radius: 15px;
            background-color: #fff;
            transition: transform 0.2s ease;
            box-shadow: 0.4s ease;

            animation-name: website;
            animation-duration: 0.8s;
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
            opacity: 0;
        }

        .card-header {
            padding: 16px;
            background-color: #ECF5FC;
            border-bottom: 2px;
            text-align: center;
        }

        .card-image {
            height: 220px;
            background-color: #ECF5FC;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ECF5FC;
            font-weight: bold;

            border-bottom: 2px dotted #FDDDE1;
        }

        .card-image img {
            width: 100%;
            height: 100%;
        }

        .card-info {
            padding: 20px;
            text-align: left;
            border-top: 2px;
            text-align: left;
            flex-grow: 1;
        }

        .store-name {
            margin: 0 0 8px 0;
            font-size: 25px;
            font-family: 'GyeonggiMillenniumTitle';
            font-weight: 800;
            color: navy;
        }

        .store-address {
            margin: 0;
            font-size: 16px;
            color: #000;
        }

        .custom-link {
            text-decoration: none;
            color: #004E82;
            display: block;
            margin-bottom: 10px;
            font-size: 20px;
            font-family: 'GyeonggiMillenniumTitle';
            font-weight: bold;
        }

        .custom-link:hover {
            color: blueviolet;
        }

        /* 태블릿 반응형 (화면 가로 768px 이하) */
        @media (max-width: 768px) {
            .app {
                width: 100%;
                padding: 0 20px;
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                grid-template-areas:
                    "header"
                    "nav"
                    "main"
                    "sidebar"
                    "footer";
            }

            aside {
                padding: 10px 0;
            }

            .profile-box,
            .category {
                width: 100%;
            }

            .profile-box {
                display: flex;
                flex-direction: row;
                justify-content: flex-start;
                align-items: center;
                gap: 20px;
                padding: 20px;
            }

            .side-image {
                width: 100px !important;
                height: 100px !important;
                margin-bottom: 0 !important;
                flex-shrink: 0;
            }

            .profile {
                padding: 0;
                text-align: left;
            }

            .card-container {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 16px;
            }

            .card {
                width: calc(50% - 8px);
            }

            nav {
                flex-direction: column;
                gap: 10px;
                padding: 20px 0;
            }

            nav img {
                width: 90px !important;
                height: 90px !important;
            }

            nav span {
                font-size: 45px !important;
            }

            .store-name {
                font-size: 20px;
            }

            .store-address {
                font-size: 14px;
            }

            main h2 {
                font-size: 26px !important;
            }
        }

        /* 모바일 반응형 (화면 가로 480px 이하) */
        @media (max-width: 480px) {
            .app {
                padding: 0 10px;
            }

            aside {
                padding: 10px;
            }

            .card {
                width: 100%;
            }

            nav img {
                width: 80px !important;
                height: 80px !important;
            }

            nav span {
                font-size: 35px !important;
            }

            .custom-link {
                font-size: 16px;
            }

            main h2 {
                font-size: 24px !important;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- 블로그 헤더 -->
        <header>
            <span>프롤로그 | 블로그</span>
            <span>지도 | 서재 | 안부</span>
        </header>

        <!-- 제목 -->
        <nav>
            <span style="font-weight: bold; font-size: 65px; color: #004E82;"> + 타이펑 +</span>
        </nav>

        <!-- 프로필 영역 -->
        <aside>
            <div class="profile-box">
                <div class="side-image">
                    <img src="../images/image1.png" alt="프로필 사진">
                </div>
                <div class="profile" style="font-size: 15px; color: #004E82; font-weight: bold;">
                    최한빈<br>
                    profile<br>
                    <br>
                    <div style="font-size: 20px; font-weight: bold; color: gray;">+ 이웃추가</div>
                </div>
            </div>

            <div class="category">
                <div>카테고리</div>
                <br>
                <div>> 전체보기</div>
                <div>> 맛집탐방</div>
                <div>> 일상</div>
                <div>> [블챌] 왓츠인마이블로그</div>

            </div>
        </aside>


        <!-- 메뉴 소개 -->
        <main>
            <h2 style="font-size: 30px;">추천 메뉴 Top 3 ✔️</h2>
            <div style="margin-top: 15px;">
                <a href="https://naver.me/FSwZFf2n" class="custom-link">📍타이펑 바로가기</a>
            </div>

            <!-- 메뉴1 -->
            <div class="card-container" style="margin-top: 15px;">

                <div class="card">
                    <div class="card-header">
                        <h3 class="store-name">+ 홍합짬뽕 +</h3>
                    </div>
                    <div class="card-image">
                        <img src="../images/타이펑1.png" alt="짬뽕">
                    </div>
                    <div class="card-info">
                        <p class="store-address">홍합, 오징어의 깊은 맛과 녹진하고 진한 맛이 담긴 국물과 쫄깃한 면발의 짬뽕 🍜
                        </p>
                    </div>
                </div>

                <!-- 메뉴2 -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="store-name">+ 마파두부 +</h3>
                    </div>
                    <div class="card-image">
                        <img src="../images/타이펑2.png" alt="마파두부">
                    </div>
                    <div class="card-info">
                        <p class="store-address">부드러운 두부와 돼지고기가 함께 볶아진, 매콤하고 알싸하면서 계속 들어가는 마파두부 🍛</p>
                    </div>
                </div>

                <!-- 메뉴3 -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="store-name">+ 군만두 +</h3>
                    </div>
                    <div class="card-image">
                        <img src="../images/타이펑3.png" alt="군만두">
                    </div>
                    <div class="card-info">
                        <p class="store-address">쫀득한 피와 삼삼한 부추와 고기가 숨겨져있는 바삭한 군만두 🥟</p>
                    </div>
                </div>

            </div>
        </main>

        <footer>
            <a href="website.html" class="back-to-main">⬅️ 메인홈으로 돌아가기</a>
        </footer>

    </div>
</body>

</html>
